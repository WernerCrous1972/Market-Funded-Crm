version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mfu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: market_funded_crm
      POSTGRES_USER: mfu
      POSTGRES_PASSWORD: mfu_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mfu -d market_funded_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mfu-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
